<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>文菖五金 保固查詢</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#f0ede8;color:#1a1a1a;min-height:100vh}
.header{background:#c41e1e;color:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:20px;font-weight:700}
.header-left p{font-size:12px;opacity:.75;margin-top:2px}
.sync-btn{display:flex;align-items:center;gap:4px;padding:8px 12px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;font-size:13px;cursor:pointer;color:#fff;font-weight:500;border:none}
.sync-btn:active{opacity:.7}
.tab-bar{display:flex;background:#a81919}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:14px;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#fff;font-weight:600}
.main{padding:14px;max-width:820px;margin:0 auto}
.page{display:none}.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:16px;outline:none;-webkit-appearance:none}
.search-row input:focus{border-color:#c41e1e}
.btn-red{padding:12px 18px;background:#c41e1e;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer}
.btn-gray{padding:12px 14px;background:#efefef;color:#555;border:none;border-radius:9px;font-size:15px;cursor:pointer}
.filters{display:flex;gap:8px}
.filter-btn{padding:7px 16px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#666}
.filter-btn.active{background:#c41e1e;color:#fff;border-color:#c41e1e}
.summary-bar{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.sb-item{flex:1;text-align:center;padding:4px 8px;border-right:1px solid #eee}
.sb-item:last-child{border-right:none}
.sb-num{font-size:20px;font-weight:700;line-height:1.2}
.sb-label{font-size:11px;color:#888;margin-top:2px}
.eye-btn{background:none;border:none;cursor:pointer;padding:0 0 0 4px;vertical-align:middle;opacity:.4;font-size:15px;line-height:1}
.masked{letter-spacing:3px;font-size:13px;color:#bbb;font-weight:400}
.cs-card{background:#fff3f3;border-left:4px solid #c41e1e;border-radius:10px;padding:14px;margin-bottom:12px}
.cs-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.cs-name{font-size:17px;font-weight:700}
.cs-total{font-size:16px;font-weight:700;color:#c41e1e;display:flex;align-items:center;gap:4px}
.cs-stats{display:flex;gap:14px;flex-wrap:wrap}
.cs-stat{font-size:13px;color:#666}
.cs-stat b{color:#222}
.result-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #ddd}
.result-item.valid{border-left-color:#22a855}
.result-item.expired{border-left-color:#c41e1e}
.ri-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:6px}
.ri-name{font-size:15px;font-weight:700}
.badge{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge.valid{background:#e4f8ec;color:#187a38}
.badge.expired{background:#fde8e8;color:#b01818}
.ri-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ri-field{font-size:13px;color:#777;line-height:1.4}
.ri-field b{color:#222;font-weight:600}
.ri-product{font-size:12px;color:#aaa;margin-top:8px;word-break:break-all;line-height:1.5;background:#f8f8f8;padding:6px 8px;border-radius:6px}
.empty{text-align:center;padding:50px 20px;color:#bbb}
.empty-icon{font-size:44px;margin-bottom:10px}
.loading{text-align:center;padding:40px 20px;color:#888}
.loading-spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#c41e1e;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pagination{display:flex;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap;padding-bottom:20px}
.pg-btn{padding:8px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;cursor:pointer;background:#fff}
.pg-btn.active{background:#c41e1e;color:#fff;border-color:#c41e1e}
.section-title{font-size:15px;font-weight:700;color:#444;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #eee}
.chart-toggle{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ct-btn{padding:7px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#555}
.ct-btn.active{background:#c41e1e;color:#fff;border-color:#c41e1e}
.analytics-search-row{display:flex;gap:8px;margin-bottom:14px}
.analytics-search-row input{flex:1;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:15px;outline:none;-webkit-appearance:none}
.analytics-search-row input:focus{border-color:#c41e1e}
.analytics-search-row button{padding:10px 16px;background:#c41e1e;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.a-summary{background:#fff8f8;border-radius:9px;padding:12px 14px;margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap;border-left:3px solid #c41e1e;align-items:center}
.a-sum-item{font-size:13px;color:#666;display:flex;align-items:center;gap:4px}
.a-sum-item b{color:#c41e1e;font-size:15px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:13px;color:#444;width:130px;text-align:right;flex-shrink:0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:24px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#e87070;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:4px}
.bar-fill.hl{background:#c41e1e}
.bar-cnt{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.bar-cnt-out{font-size:12px;font-weight:600;color:#888;margin-left:5px}
.trend-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:6px}
.trend-b{flex:1;background:#e87070;border-radius:3px 3px 0 0;min-height:3px}
.trend-labels{display:flex;gap:4px;margin-bottom:12px}
.trend-lbl{flex:1;font-size:9px;color:#aaa;text-align:center}
.status-bar{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#666;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22a855;flex-shrink:0}
.status-dot.loading{background:#f0a500;animation:pulse 1s infinite}
.status-dot.error{background:#c41e1e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>🔧 文菖五金 保固查詢</h1>
    <p>Milwaukee 工具保固管理</p>
  </div>
  <button class="sync-btn" onclick="loadData()">🔄 同步</button>
</div>
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('search',this)">🔍 保固查詢</div>
  <div class="tab" onclick="switchTab('analytics',this)">📊 銷售分析</div>
</div>
<div class="main">

<div id="page-search" class="page active">
  <div id="statusBar" class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">正在從 Google Sheets 載入資料...</span>
  </div>
  <div class="card">
    <div class="search-row">
      <input type="search" id="searchInput" placeholder="客戶名稱、電話、產品序號..." autocomplete="off">
      <button class="btn-red" onclick="doSearch()">查詢</button>
      <button class="btn-gray" onclick="clearSearch()">✕</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('valid',this)">✅ 保固中</button>
      <button class="filter-btn" onclick="setFilter('expired',this)">❌ 已過期</button>
    </div>
  </div>
  <div class="summary-bar">
    <div class="sb-item"><div class="sb-num" id="sbTotal">-</div><div class="sb-label">筆紀錄</div></div>
    <div class="sb-item"><div class="sb-num" style="color:#22a855" id="sbValid">-</div><div class="sb-label">保固中</div></div>
    <div class="sb-item"><div class="sb-num" style="color:#c41e1e" id="sbExpired">-</div><div class="sb-label">已過期</div></div>
    <div class="sb-item">
      <div class="sb-num masked" id="sbAmt">****</div>
      <div class="sb-label">查詢總金額 <button class="eye-btn" id="eyeAmt" onclick="toggleAmt()">👁</button></div>
    </div>
  </div>
  <div id="customerSummary"></div>
  <div id="resultsList"><div class="loading"><div class="loading-spinner"></div>載入中...</div></div>
  <div class="pagination" id="pagination"></div>
</div>

<div id="page-analytics" class="page">
  <div class="card">
    <div class="section-title">產品銷售查詢</div>
    <div class="analytics-search-row">
      <input type="search" id="aSearchInput" placeholder="輸入產品名稱，例如 M18B5..." autocomplete="off">
      <button onclick="doAnalyticsSearch()">查詢</button>
    </div>
    <div id="aSummary"></div>
    <div class="chart-toggle">
      <button class="ct-btn active" onclick="setChartMode('top20',this)">Top 20</button>
      <button class="ct-btn" onclick="setChartMode('top10',this)">Top 10</button>
      <button class="ct-btn" onclick="setChartMode('trend',this)">月趨勢</button>
    </div>
    <div class="section-title" id="chartTitle">全部產品銷售 Top 20</div>
    <div id="chartArea"></div>
  </div>
</div>

</div>
<script>
var CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSsFfDA2dL8LCxZZl4I1YgLEuGwlSU42y-uRqKkbdNVJraaOfKQoCEmFHa6G94grTE-u0SmWb-z08Ez/pub?output=csv';
var PAGE_SIZE=25;
var allData=[],filtered=[],currentPage=1,currentFilter='all',searchTerm='';
var chartMode='top20',analyticsSearchTerm='';
var amtVisible=false,csAmtVisible=false,aAmtVisible=false;
var sbAmtReal='';
var lastSync=null;

function warrantyMonths(pd){return parseInt(pd,10)<20240101?12:24}

function parseD(s){
  s=String(s).replace(/[^0-9]/g,'');
  if(s.length===8)return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
  if(s.length===6)return new Date(+(s.slice(0,2)>50?'19':'20')+s.slice(0,2),+s.slice(2,4)-1,+s.slice(4,6));
  return null;
}

function wStatus(pd){
  var d=parseD(pd);
  if(!d)return{status:'expired',label:'日期異常',exp:null};
  var exp=new Date(d.getTime());
  exp.setMonth(exp.getMonth()+warrantyMonths(pd));
  var days=Math.ceil((exp.getTime()-Date.now())/86400000);
  if(days>=0)return{status:'valid',label:'保固中 剩'+days+'天',exp:exp};
  return{status:'expired',label:'已過期 '+Math.abs(days)+'天前',exp:exp};
}

function fmtD(d){
  if(!d)return'-';
  return d.getFullYear()+'/'+(''+(d.getMonth()+1)).padStart(2,'0')+'/'+(''+(d.getDate())).padStart(2,'0');
}
function fmtPD(pd){var d=parseD(pd);return d?fmtD(d):pd}
function parseAmt(s){var n=parseFloat(String(s).replace(/[^0-9.]/g,''));return isNaN(n)?0:n}

function parseCSV(text){
  var lines=text.split('\n');
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    var cols=[];var cur='';var inQ=false;
    for(var j=0;j<line.length;j++){
      var c=line[j];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.trim());
    var pd=String(cols[0]||'').replace(/[^0-9]/g,'');
    if(pd.length===6)pd='2'+pd;
    if(!pd||pd.length<6)continue;
    var product=String(cols[3]||'').trim();
    var pname=product;
    if(pname.indexOf('|')>=0)pname=pname.split('|')[0].trim();
    pname=pname.replace(/\s+[A-Z0-9]{6,}.*$/,'').trim().toUpperCase();
    rows.push({
      pd:pd,
      name:String(cols[1]||'').trim(),
      phone:String(cols[2]||'').replace(/\.0$/,'').trim(),
      product:product,
      note:String(cols[4]||'').replace(/\.0$/,'').trim(),
      pname:pname||'未知'
    });
  }
  return rows;
}

function setStatus(type,msg){
  var dot=document.getElementById('statusDot');
  var txt=document.getElementById('statusText');
  dot.className='status-dot'+(type==='loading'?' loading':type==='error'?' error':'');
  txt.textContent=msg;
}

function loadData(){
  setStatus('loading','正在同步 Google Sheets 資料...');
  var url=CSV_URL+'&t='+Date.now();
  fetch(url)
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(function(text){
      allData=parseCSV(text);
      lastSync=new Date();
      var ts=lastSync.getHours()+':'+(''+(lastSync.getMinutes())).padStart(2,'0');
      setStatus('ok','已同步 '+allData.length.toLocaleString()+' 筆｜最後更新 '+ts);
      applyFilters();
    })
    .catch(function(err){
      setStatus('error','載入失敗，請檢查網路或點右上角重新同步');
      document.getElementById('resultsList').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>無法載入資料</p></div>';
    });
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='analytics')renderChart();
}

function applyFilters(){
  var base=allData;
  if(searchTerm){
    var t=searchTerm.toLowerCase();
    base=base.filter(function(r){
      return r.name.toLowerCase().indexOf(t)>=0||r.phone.indexOf(t)>=0||r.product.toLowerCase().indexOf(t)>=0;
    });
  }
  if(currentFilter!=='all'){
    base=base.filter(function(r){return wStatus(r.pd).status===currentFilter});
  }
  filtered=base;currentPage=1;
  renderSummaryBar();renderCustomerSummary();renderResults();
}

function renderSummaryBar(){
  document.getElementById('sbTotal').textContent=allData.length.toLocaleString();
  var v=allData.filter(function(r){return wStatus(r.pd).status==='valid'}).length;
  document.getElementById('sbValid').textContent=v.toLocaleString();
  document.getElementById('sbExpired').textContent=(allData.length-v).toLocaleString();
  var src=(searchTerm||currentFilter!=='all')?filtered:allData;
  var amt=src.reduce(function(s,r){return s+parseAmt(r.note)},0);
  sbAmtReal=amt>0?'NT$'+amt.toLocaleString():'';
  var el=document.getElementById('sbAmt');
  el.textContent=amtVisible?(sbAmtReal||'-'):'****';
  el.className='sb-num'+(amtVisible?'':' masked');
}

function toggleAmt(){
  amtVisible=!amtVisible;
  var el=document.getElementById('sbAmt');
  el.textContent=amtVisible?(sbAmtReal||'-'):'****';
  el.className='sb-num'+(amtVisible?'':' masked');
  document.getElementById('eyeAmt').textContent=amtVisible?'🙈':'👁';
}

function toggleCsAmt(){
  csAmtVisible=!csAmtVisible;
  var el=document.getElementById('csAmtSpan');
  var eye=document.getElementById('eyeCs');
  if(!el)return;
  var v=parseInt(el.getAttribute('data-val'),10)||0;
  el.textContent=csAmtVisible?'NT$'+v.toLocaleString():'****';
  el.className=csAmtVisible?'':'masked';
  eye.textContent=csAmtVisible?'🙈':'👁';
}

function toggleAAmt(){
  aAmtVisible=!aAmtVisible;
  var el=document.getElementById('aAmtSpan');
  var eye=document.getElementById('eyeA');
  if(!el)return;
  var v=parseInt(el.getAttribute('data-val'),10)||0;
  el.textContent=aAmtVisible?'NT$'+v.toLocaleString():'****';
  el.className=aAmtVisible?'':'masked';
  eye.textContent=aAmtVisible?'🙈':'👁';
}

function renderCustomerSummary(){
  var cs=document.getElementById('customerSummary');
  if(!searchTerm){cs.innerHTML='';return}
  var t=searchTerm.toLowerCase();
  var byC=filtered.filter(function(r){return r.name.toLowerCase().indexOf(t)>=0||r.phone.indexOf(t)>=0});
  if(byC.length<2){cs.innerHTML='';return}
  csAmtVisible=false;
  var total=byC.reduce(function(s,r){return s+parseAmt(r.note)},0);
  var valid=byC.filter(function(r){return wStatus(r.pd).status==='valid'}).length;
  cs.innerHTML='<div class="cs-card">'
    +'<div class="cs-header">'
    +'<div class="cs-name">'+byC[0].name+'</div>'
    +(total>0?'<div class="cs-total"><span id="csAmtSpan" data-val="'+total+'" class="masked">****</span><button class="eye-btn" id="eyeCs" onclick="toggleCsAmt()">👁</button></div>':'')
    +'</div>'
    +'<div class="cs-stats">'
    +(byC[0].phone?'<div class="cs-stat">📞 <b>'+byC[0].phone+'</b></div>':'')
    +'<div class="cs-stat">📦 共 <b>'+byC.length+' 筆</b>購買紀錄</div>'
    +'<div class="cs-stat">✅ 保固中 <b>'+valid+' 筆</b></div>'
    +'<div class="cs-stat">❌ 已過期 <b>'+(byC.length-valid)+' 筆</b></div>'
    +'</div></div>';
}

function renderResults(){
  var total=filtered.length;
  var start=(currentPage-1)*PAGE_SIZE;
  var page=filtered.slice(start,start+PAGE_SIZE);
  var list=document.getElementById('resultsList');
  if(!total){
    list.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>找不到符合的紀錄</p></div>';
    document.getElementById('pagination').innerHTML='';return;
  }
  var html='';
  for(var i=0;i<page.length;i++){
    var r=page[i];var ws=wStatus(r.pd);var months=warrantyMonths(r.pd);
    html+='<div class="result-item '+ws.status+'">'
      +'<div class="ri-top"><div class="ri-name">'+(r.name||'—')+'</div>'
      +'<span class="badge '+ws.status+'">'+(ws.status==='valid'?'✅':'❌')+' '+ws.label+'</span></div>'
      +'<div class="ri-grid">'
      +'<div class="ri-field">📅 購買 <b>'+fmtPD(r.pd)+'</b></div>'
      +'<div class="ri-field">🔒 到期 <b>'+(ws.exp?fmtD(ws.exp):'-')+'</b></div>'
      +(r.phone?'<div class="ri-field">📞 <b>'+r.phone+'</b></div>':'')
      +'<div class="ri-field">📋 保固 <b>'+months+'個月</b></div>'
      +(parseAmt(r.note)>0?'<div class="ri-field">💰 <b>NT$'+parseAmt(r.note).toLocaleString()+'</b></div>':'')
      +'</div><div class="ri-product">'+r.product+'</div></div>';
  }
  list.innerHTML=html;
  renderPagination(total);
}

function renderPagination(total){
  var pages=Math.ceil(total/PAGE_SIZE);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return}
  var p=currentPage,html='';
  if(p>1)html+='<button class="pg-btn" onclick="goPage('+(p-1)+')">‹</button>';
  var s=Math.max(1,p-2),e=Math.min(pages,p+2);
  if(s>1)html+='<button class="pg-btn" onclick="goPage(1)">1</button>'+(s>2?'<span>…</span>':'');
  for(var i=s;i<=e;i++)html+='<button class="pg-btn'+(i===p?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  if(e<pages)html+=(e<pages-1?'<span>…</span>':'')+'<button class="pg-btn" onclick="goPage('+pages+')">'+pages+'</button>';
  if(p<pages)html+='<button class="pg-btn" onclick="goPage('+(p+1)+')">›</button>';
  document.getElementById('pagination').innerHTML=html;
}

function goPage(n){currentPage=n;renderResults();window.scrollTo(0,0)}
function doSearch(){searchTerm=document.getElementById('searchInput').value.trim();applyFilters()}
function clearSearch(){document.getElementById('searchInput').value='';searchTerm='';applyFilters()}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');applyFilters();
}
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});

function doAnalyticsSearch(){
  analyticsSearchTerm=document.getElementById('aSearchInput').value.trim().toUpperCase();
  renderChart();
}
document.getElementById('aSearchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doAnalyticsSearch()});
function setChartMode(m,btn){chartMode=m;document.querySelectorAll('.ct-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');renderChart()}

function renderChart(){
  var area=document.getElementById('chartArea');
  var titleEl=document.getElementById('chartTitle');
  var aSummary=document.getElementById('aSummary');
  if(!allData.length){area.innerHTML='<div class="empty"><p>資料載入中...</p></div>';return}

  if(chartMode==='trend'){
    var base=analyticsSearchTerm
      ?allData.filter(function(r){return r.pname.indexOf(analyticsSearchTerm)>=0||r.product.toUpperCase().indexOf(analyticsSearchTerm)>=0})
      :allData;
    titleEl.textContent=analyticsSearchTerm?'「'+analyticsSearchTerm+'」近12個月趨勢':'全部產品 近12個月趨勢';
    var now=new Date(),months=[],counts=[];
    for(var i=11;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:d.getFullYear()*100+(d.getMonth()+1),label:(d.getMonth()+1)+'月'})}
    for(var mi=0;mi<months.length;mi++){
      var mk=months[mi].key;
      counts.push(base.filter(function(r){var dd=parseD(r.pd);return dd&&dd.getFullYear()*100+(dd.getMonth()+1)===mk}).length);
    }
    var maxC=Math.max.apply(null,counts.concat([1]));
    var tw='<div class="trend-wrap">';
    for(var ti=0;ti<counts.length;ti++)tw+='<div class="trend-b" style="height:'+Math.max(3,Math.round(counts[ti]/maxC*74))+'px"></div>';
    tw+='</div><div class="trend-labels">';
    for(var li=0;li<months.length;li++)tw+='<div class="trend-lbl">'+months[li].label+'</div>';
    tw+='</div>';
    for(var bi=0;bi<counts.length;bi++){
      var pct=Math.max(4,Math.round(counts[bi]/maxC*100));
      tw+='<div class="bar-row"><div class="bar-label">'+months[bi].label+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%">'+(counts[bi]>=5?'<span class="bar-cnt">'+counts[bi]+'</span>':'')+'</div></div>'
        +(counts[bi]<5?'<span class="bar-cnt-out">'+counts[bi]+'</span>':'')+'</div>';
    }
    area.innerHTML=tw;return;
  }

  var N=chartMode==='top10'?10:20;
  if(analyticsSearchTerm){
    aAmtVisible=false;
    var matched=allData.filter(function(r){return r.pname.indexOf(analyticsSearchTerm)>=0||r.product.toUpperCase().indexOf(analyticsSearchTerm)>=0});
    if(!matched.length){
      aSummary.innerHTML='<div class="a-summary"><div class="a-sum-item">找不到「'+analyticsSearchTerm+'」的資料</div></div>';
      area.innerHTML='';titleEl.textContent='';return;
    }
    var amt=matched.reduce(function(s,r){return s+parseAmt(r.note)},0);
    var valid=matched.filter(function(r){return wStatus(r.pd).status==='valid'}).length;
    var map={};matched.forEach(function(r){map[r.pname]=(map[r.pname]||0)+1});
    var sorted=Object.entries(map).sort(function(a,b){return b[1]-a[1]});
    aSummary.innerHTML='<div class="a-summary">'
      +'<div class="a-sum-item">🔍 <b>'+analyticsSearchTerm+'</b></div>'
      +'<div class="a-sum-item">📦 共 <b>'+matched.length+'</b> 筆</div>'
      +(amt>0?'<div class="a-sum-item">💰 <span id="aAmtSpan" data-val="'+amt+'" class="masked">****</span><button class="eye-btn" id="eyeA" onclick="toggleAAmt()">👁</button></div>':'')
      +'<div class="a-sum-item">✅ 保固中 <b>'+valid+'</b> 筆</div>'
      +'</div>';
    titleEl.textContent='「'+analyticsSearchTerm+'」相關產品';
    var maxS=sorted[0][1];var sh='';
    for(var si=0;si<sorted.length;si++){
      var nm=sorted[si][0],cnt=sorted[si][1];
      var p2=Math.round(cnt/maxS*100);
      var isHl=nm===analyticsSearchTerm||nm.indexOf(analyticsSearchTerm)>=0;
      sh+='<div class="bar-row"><div class="bar-label" title="'+nm+'">'+nm+'</div>'
        +'<div class="bar-track"><div class="bar-fill'+(isHl?' hl':'')+'" style="width:'+Math.max(6,p2)+'%">'+(p2>=20?'<span class="bar-cnt">'+cnt+'</span>':'')+'</div></div>'
        +(p2<20?'<span class="bar-cnt-out">'+cnt+'</span>':'')+'</div>';
    }
    area.innerHTML=sh;
  } else {
    aSummary.innerHTML='';
    titleEl.textContent='全部產品銷售 Top '+N;
    var map2={};allData.forEach(function(r){map2[r.pname]=(map2[r.pname]||0)+1});
    var sorted2=Object.entries(map2).sort(function(a,b){return b[1]-a[1]}).slice(0,N);
    var max2=sorted2[0]?sorted2[0][1]:1;var sh2='';
    for(var si2=0;si2<sorted2.length;si2++){
      var n2=sorted2[si2][0],c2=sorted2[si2][1];
      var p3=Math.round(c2/max2*100);
      sh2+='<div class="bar-row"><div class="bar-label" title="'+n2+'">'+n2+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.max(6,p3)+'%">'+(p3>=20?'<span class="bar-cnt">'+c2+'</span>':'')+'</div></div>'
        +(p3<20?'<span class="bar-cnt-out">'+c2+'</span>':'')+'</div>';
    }
    area.innerHTML=sh2;
  }
}

loadData();
</script>
</body>
</html>
